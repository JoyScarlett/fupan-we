<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>月度复盘</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1f2937;
    --muted: #6b7280;
    --mint: #b8e0d2;
    --mint-deep: #5fb89a;
    --mint-soft: #e8f5ef;
    --pink: #ffd1d9;
    --pink-deep: #f48fb1;
    --orange-soft: #fde2c4;
    --warn: #ef6c00;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    line-height: 1.5;
    padding: 24px 16px 80px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  /* Top bar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 13px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--mint-deep); color: var(--mint-deep); }
  .btn.primary { background: var(--mint-deep); color: #fff; border-color: var(--mint-deep); }
  .btn.primary:hover { background: #4ca888; color: #fff; }
  .btn.warn { color: var(--warn); border-color: #fbb88a; }

  h1.title {
    font-size: 32px; font-weight: 700; text-align: center;
    margin: 16px 0 28px; letter-spacing: 0.05em;
  }
  h1.title input {
    font: inherit; text-align: center; border: none;
    background: transparent; color: inherit; outline: none;
    width: 100%; max-width: 480px;
  }
  h1.title input:focus { background: #fff; border-bottom: 2px dashed var(--mint-deep); }

  /* Section label bubble */
  .label {
    display: inline-block;
    background: var(--pink); color: #5d3a47;
    padding: 6px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
    margin: 4px 0 12px;
  }
  .label::before { content: '✓ '; color: #b85a72; }

  .section { margin-bottom: 36px; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    overflow-x: auto;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
  th, td {
    border: 1px solid var(--border);
    padding: 8px 10px; text-align: center; vertical-align: middle;
  }
  th {
    background: var(--mint-soft); color: #2d5d4f;
    font-weight: 600;
  }
  td[contenteditable] { cursor: text; min-width: 60px; }
  td[contenteditable]:focus { outline: 2px solid var(--mint-deep); outline-offset: -2px; background: #fffef5; }
  td.rate {
    background: var(--orange-soft); font-weight: 600;
  }
  tr.add-row td { background: #fafafa; color: var(--muted); cursor: pointer; }
  tr.add-row td:hover { color: var(--mint-deep); }

  /* Habit grid */
  .habit-table { min-width: 800px; }
  .habit-table th, .habit-table td { padding: 4px 2px; font-size: 12px; min-width: 22px; }
  .habit-table th.day { background: var(--mint); color: #fff; }
  .habit-table td.name { text-align: left; padding-left: 10px; min-width: 90px; background: var(--mint-soft); font-weight: 500; }
  .habit-cell {
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .habit-cell:hover { background: #f0f9f5; }
  .habit-cell.checked {
    background: var(--mint-soft);
    color: var(--mint-deep);
    font-weight: 700;
  }
  .habit-cell.weekend { background: #fafafa; }
  .habit-cell.checked.weekend { background: var(--mint-soft); }
  td.target, td.achieved, td.rate { background: #fef3e8; }
  td.rate { color: #c2410c; }

  .habit-section + .habit-section { margin-top: 14px; }
  .habit-actions {
    display: flex; gap: 8px; padding: 8px 0;
    align-items: center; flex-wrap: wrap;
  }
  .habit-actions input {
    flex: 1; min-width: 140px;
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; font-size: 13px;
    outline: none;
  }
  .habit-actions input:focus { border-color: var(--mint-deep); }
  .habit-actions select {
    padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 6px; font: inherit; font-size: 13px;
    background: #fff;
  }
  .row-del {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 0 6px;
  }
  .row-del:hover { color: var(--warn); }

  /* Charts */
  /* Freq chart */
  .freq-title {
    text-align: center; font-size: 14px; font-weight: 600;
    color: #6b6b6b; padding: 8px; margin-bottom: 4px;
  }
  .freq-svg { width: 100%; height: 240px; display: block; }
  .rings {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--border);
  }
  .ring-card { text-align: center; }
  .ring-card .ring-head {
    display: flex; justify-content: center; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted); margin-bottom: 8px;
  }
  .ring-card .ring-head strong { color: var(--text); font-size: 14px; }
  .ring-card .delta { font-size: 12px; font-weight: 600; }
  .ring-card .delta.up { color: #f59e0b; }
  .ring-card .delta.down { color: #6b7280; }
  .ring-svg { width: 130px; height: 130px; }
  .ring-svg .bg { fill: none; stroke: #f3f4f6; stroke-width: 14; }
  .ring-svg .fg { fill: none; stroke: #f59e0b; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
  .ring-svg .pct {
    font-size: 22px; font-weight: 700; fill: #f59e0b;
  }
  @media (max-width: 720px) {
    .rings { grid-template-columns: 1fr; gap: 12px; }
    .freq-svg { height: 200px; }
  }

  .chart-card h4 {
    margin: 0 0 8px; font-size: 14px; color: #2d5d4f;
    text-align: center; background: var(--mint-soft);
    padding: 6px; border-radius: 6px;
  }
  .chart-svg { width: 100%; height: 160px; }
  .chart-inputs {
    display: flex; gap: 4px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .chart-inputs input {
    width: 48px; padding: 4px; font-size: 11px;
    border: 1px solid var(--border); border-radius: 4px;
    text-align: center; outline: none;
  }
  .chart-inputs input:focus { border-color: var(--mint-deep); }
  .chart-inputs label {
    display: flex; flex-direction: column; align-items: center;
    font-size: 10px; color: var(--muted); gap: 2px;
  }

  /* Achievements / KISS */
  .ach-card, .kiss-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .ach-card h4, .kiss-card h4 {
    margin: 0 0 10px; font-size: 14px;
    display: inline-block; padding: 4px 14px;
    border-radius: 999px;
  }
  .ach-card h4 { background: var(--mint); color: #fff; }
  .kiss-card.keep h4 { background: var(--mint); color: #fff; }
  .kiss-card.improve h4 { background: var(--pink); color: #5d3a47; }
  .kiss-card.start h4 { background: var(--mint-soft); color: var(--mint-deep); }
  .kiss-card.stop h4 { background: var(--orange-soft); color: var(--warn); }
  .editable-list {
    min-height: 80px; font-size: 13px; outline: none;
    line-height: 1.7; color: var(--text);
    white-space: pre-wrap;
  }
  .editable-list:empty::before {
    content: attr(data-placeholder);
    color: var(--muted);
  }
  .editable-list:focus { background: #fffef5; border-radius: 6px; }

  .kiss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .kiss-grid .center {
    grid-column: 1 / -1;
    text-align: center;
    background: var(--pink); color: #5d3a47;
    padding: 8px; border-radius: 999px;
    font-weight: 600; font-size: 14px;
    margin: 4px 0;
  }

  /* Alarm modal */
  .modal-mask {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100; padding: 16px;
  }
  .modal-mask.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: 14px;
    padding: 22px; max-width: 420px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: pop 0.2s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal-box h3 {
    margin: 0 0 8px; font-size: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-box .hint {
    color: var(--muted); font-size: 12px;
    background: var(--mint-soft); padding: 8px 10px;
    border-radius: 6px; margin: 10px 0;
    line-height: 1.6;
  }
  .alarm-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .alarm-row:last-child { border-bottom: none; }
  .alarm-row input[type=time] {
    font: inherit; font-size: 18px; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    outline: none; flex: 1;
  }
  .alarm-row input[type=text] {
    font: inherit; font-size: 13px; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    outline: none; flex: 2; min-width: 80px;
  }
  .alarm-row input:focus { border-color: var(--mint-deep); }
  .alarm-row .switch {
    position: relative; width: 38px; height: 22px;
    background: #d1d5db; border-radius: 999px;
    cursor: pointer; transition: background 0.2s;
    flex-shrink: 0;
  }
  .alarm-row .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; background: #fff;
    border-radius: 50%; transition: transform 0.2s;
  }
  .alarm-row.on .switch { background: var(--mint-deep); }
  .alarm-row.on .switch::after { transform: translateX(16px); }
  .alarm-row .row-del { font-size: 18px; }
  .modal-actions {
    display: flex; gap: 8px; margin-top: 14px;
  }
  .modal-actions button { flex: 1; }

  .global-switch {
    display: flex; align-items: center; justify-content: space-between;
    background: #f9fafb; padding: 10px 12px; border-radius: 8px;
    margin-bottom: 10px;
  }
  .global-switch .switch {
    position: relative; width: 38px; height: 22px;
    background: #d1d5db; border-radius: 999px;
    cursor: pointer; transition: background 0.2s;
  }
  .global-switch .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; background: #fff;
    border-radius: 50%; transition: transform 0.2s;
  }
  .global-switch.on .switch { background: var(--mint-deep); }
  .global-switch.on .switch::after { transform: translateX(16px); }

  /* Mobile */
  @media (max-width: 720px) {
    body { padding: 12px 10px 60px; }
    h1.title { font-size: 24px; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .kiss-grid { grid-template-columns: 1fr; }
    .label { font-size: 13px; }
    .card { padding: 10px; }
    th, td { padding: 6px 6px; font-size: 12px; }
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--mint-deep); color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 200; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div style="font-size: 13px; color: var(--muted); letter-spacing: 0.1em;">📓 MONTHLY REVIEW</div>
    <div class="topbar-actions">
      <select class="btn" id="monthPicker"></select>
      <button class="btn" id="alarmBtn">⏰ 提醒</button>
      <button class="btn" id="exportBtn">导出</button>
      <button class="btn" id="importBtn">导入</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
      <button class="btn warn" id="resetBtn">清空本月</button>
    </div>
  </div>

  <h1 class="title"><input id="titleInput" placeholder="2025年9月复盘" /></h1>

  <!-- 1. 目标 -->
  <div class="section">
    <span class="label">本月目标执行情况</span>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th rowspan="2">板块</th>
            <th colspan="2">目标 (Objective)</th>
            <th>关键成果 (KR)</th>
            <th colspan="3">本月执行</th>
          </tr>
          <tr>
            <th>类别</th>
            <th>目标</th>
            <th>KR</th>
            <th>达成</th>
            <th>目标</th>
            <th>完成率</th>
          </tr>
        </thead>
        <tbody id="okrBody"></tbody>
      </table>
      <div style="text-align:right; margin-top: 8px;">
        <button class="btn" id="addOkrBtn">+ 添加目标</button>
      </div>
    </div>
  </div>

  <!-- 2. 打卡频率分析 -->
  <div class="section">
    <span class="label">打卡频率分析</span>
    <div class="card">
      <div class="freq-title">打卡频率折线图</div>
      <svg class="freq-svg" id="freqChart" viewBox="0 0 700 220" preserveAspectRatio="none"></svg>
      <div class="rings" id="rings"></div>
    </div>
  </div>

  <!-- 3. 三类打卡 -->
  <div class="section">
    <span class="label">虚拟打卡 / Ai打卡 / 客户记录</span>
    <div class="card">
      <div class="habit-section" data-section="habit">
        <div class="habit-actions">
          <strong style="color: var(--mint-deep);">📍 虚拟打卡</strong>
          <input placeholder="新增虚拟打卡项，如：发资料" data-add="habit" />
          <button class="btn primary" data-add-btn="habit">+ 添加</button>
        </div>
        <div style="overflow-x: auto;">
          <table class="habit-table" id="habitTable_habit"></table>
        </div>
      </div>

      <div class="habit-section" data-section="sport" style="margin-top: 24px;">
        <div class="habit-actions">
          <strong style="color: var(--mint-deep);">🤖 Ai打卡</strong>
          <input placeholder="新增 Ai 打卡项，如：选题/生成/发布" data-add="sport" />
          <button class="btn primary" data-add-btn="sport">+ 添加</button>
        </div>
        <div style="overflow-x: auto;">
          <table class="habit-table" id="habitTable_sport"></table>
        </div>
      </div>

      <div class="habit-section" data-section="study" style="margin-top: 24px;">
        <div class="habit-actions">
          <strong style="color: var(--mint-deep);">� 客户记录</strong>
          <input placeholder="新增客户记录项，如：私聊1人" data-add="study" />
          <button class="btn primary" data-add-btn="study">+ 添加</button>
        </div>
        <div style="overflow-x: auto;">
          <table class="habit-table" id="habitTable_study"></table>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 本月成就 -->
  <div class="section">
    <span class="label">本月成就</span>
    <div class="grid-4">
      <div class="ach-card"><h4>📚 书单</h4><div class="editable-list" contenteditable="true" data-key="ach_books" data-placeholder="①《书名》进度：100%&#10;②《书名》进度：20%"></div></div>
      <div class="ach-card"><h4>🎬 影音</h4><div class="editable-list" contenteditable="true" data-key="ach_media" data-placeholder="①《电影》&#10;②《纪录片》"></div></div>
      <div class="ach-card"><h4>💼 副业</h4><div class="editable-list" contenteditable="true" data-key="ach_work" data-placeholder="技能：&#10;成果："></div></div>
      <div class="ach-card"><h4>💰 理财</h4><div class="editable-list" contenteditable="true" data-key="ach_money" data-placeholder="收入：&#10;支出：&#10;结余："></div></div>
    </div>
  </div>

  <!-- 5. KISS -->
  <div class="section">
    <span class="label">KISS 复盘法</span>
    <div class="kiss-grid">
      <div class="kiss-card keep"><h4>Keep（保持）</h4><div class="editable-list" contenteditable="true" data-key="kiss_keep" data-placeholder="1. 坚持的好习惯..."></div></div>
      <div class="kiss-card improve"><h4>Improve（改进）</h4><div class="editable-list" contenteditable="true" data-key="kiss_improve" data-placeholder="1. 需要改进的地方..."></div></div>
      <div class="center">KISS 复盘法</div>
      <div class="kiss-card start"><h4>Start（开始）</h4><div class="editable-list" contenteditable="true" data-key="kiss_start" data-placeholder="1. 下月开始做..."></div></div>
      <div class="kiss-card stop"><h4>Stop（停止）</h4><div class="editable-list" contenteditable="true" data-key="kiss_stop" data-placeholder="1. 不再做的事..."></div></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Alarm modal -->
<div class="modal-mask" id="alarmModal">
  <div class="modal-box">
    <h3>⏰ 打卡提醒</h3>
    <div class="hint">
      设定每日提醒时间，到点会响铃 + 弹浏览器通知。<br/>
      ⚠仅在页面打开时生效（可后台/锁屏）。
    </div>
    <div class="global-switch" id="globalSwitch">
      <span>总开关</span>
      <div class="switch"></div>
    </div>
    <div id="alarmList"></div>
    <div class="modal-actions">
      <button class="btn" id="addAlarmBtn">+ 添加提醒</button>
      <button class="btn" id="testAlarmBtn">⚡ 测试响铃</button>
      <button class="btn primary" id="closeAlarmBtn">完成</button>
    </div>
  </div>
</div>

<script>
(function(){
  const PREFIX = 'monthly_review_';
  const SECTIONS = ['habit','sport','study'];

  // ---------- month state ----------
  function pad(n){ return String(n).padStart(2,'0'); }
  function ymKey(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1); }
  function daysInMonth(ym) {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m, 0).getDate();
  }
  function dayOfWeek(ym, day) {
    const [y,m] = ym.split('-').map(Number);
    return new Date(y, m-1, day).getDay(); // 0 sun
  }
  const WEEK_CN = ['日','一','二','三','四','五','六'];

  let currentYm = ymKey(new Date());

  function defaultState(ym) {
    const dim = daysInMonth(ym);
    const [y,m] = ym.split('-').map(Number);
    return {
      title: `${y}年${m}月复盘`,
      okr: [
        { area:'身心健康', obj:'保持健康', kr:'每周运动2次', done:'', target:'', },
        { area:'工作副业', obj:'发展副业', kr:'PPT定制', done:'', target:'', },
        { area:'财务规划', obj:'攒钱', kr:'存款', done:'', target:'', },
        { area:'自我提升', obj:'阅读', kr:'每月1本', done:'', target:'', },
      ],
      steps: Array(dim).fill(''),
      weight: Array(dim).fill(''),
      habits: {
        habit: [{ name:'发资料', target: dim, days: Array(dim).fill(false) }],
        sport: [{ name:'AI 内容发布', target: 10, days: Array(dim).fill(false) }],
        study: [{ name:'私聊 1 人', target: dim, days: Array(dim).fill(false) }]
      },
      texts: {}
    };
  }

  function load(ym) {
    try {
      const raw = localStorage.getItem(PREFIX + ym);
      if (!raw) return defaultState(ym);
      const parsed = JSON.parse(raw);
      // ensure arrays match current dim
      const dim = daysInMonth(ym);
      parsed.steps = ensureLen(parsed.steps, dim, '');
      parsed.weight = ensureLen(parsed.weight, dim, '');
      SECTIONS.forEach(s => {
        (parsed.habits[s]||[]).forEach(h => {
          h.days = ensureLen(h.days, dim, false);
        });
      });
      return Object.assign(defaultState(ym), parsed);
    } catch { return defaultState(ym); }
  }
  function ensureLen(arr, n, fill) {
    arr = Array.isArray(arr) ? arr.slice() : [];
    while (arr.length < n) arr.push(fill);
    return arr.slice(0, n);
  }
  function save() {
    localStorage.setItem(PREFIX + currentYm, JSON.stringify(state));
  }

  let state = load(currentYm);

  // ---------- toast ----------
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(()=>el.classList.remove('show'), 1500);
  }

  // ---------- month picker ----------
  function buildMonthPicker() {
    const sel = document.getElementById('monthPicker');
    sel.innerHTML = '';
    const now = new Date();
    const months = [];
    for (let i = -6; i <= 6; i++) {
      const d = new Date(now.getFullYear(), now.getMonth()+i, 1);
      months.push(ymKey(d));
    }
    if (!months.includes(currentYm)) months.push(currentYm);
    months.sort();
    months.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m.replace('-','年') + '月';
      if (m === currentYm) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => {
      currentYm = sel.value;
      state = load(currentYm);
      renderAll();
    };
  }

  // ---------- title ----------
  function renderTitle() {
    document.getElementById('titleInput').value = state.title || '';
  }
  document.getElementById('titleInput').addEventListener('input', e => {
    state.title = e.target.value; save();
  });

  // ---------- OKR ----------
  function renderOkr() {
    const tb = document.getElementById('okrBody');
    tb.innerHTML = '';
    state.okr.forEach((row, i) => {
      const tr = document.createElement('tr');
      const rate = (row.done && row.target && +row.target) ? Math.round(+row.done / +row.target * 100) + '%' : '';
      tr.innerHTML = `
        <td contenteditable data-f="area">${esc(row.area)}</td>
        <td contenteditable data-f="obj">${esc(row.obj)}</td>
        <td contenteditable data-f="objText">${esc(row.objText||'')}</td>
        <td contenteditable data-f="kr">${esc(row.kr)}</td>
        <td contenteditable data-f="done">${esc(row.done)}</td>
        <td contenteditable data-f="target">${esc(row.target)}</td>
        <td class="rate">${rate}</td>
        <td><button class="row-del" title="删除">×</button></td>
      `;
      tr.querySelectorAll('[contenteditable]').forEach(td => {
        td.addEventListener('blur', () => {
          row[td.dataset.f] = td.textContent.trim();
          save();
          renderOkr();
        });
      });
      tr.querySelector('.row-del').onclick = () => {
        state.okr.splice(i,1); save(); renderOkr();
      };
      tb.appendChild(tr);
    });
    // header has 7 cols; we have 8 with delete. Adjust: actually change header to add an empty col
  }
  document.getElementById('addOkrBtn').onclick = () => {
    state.okr.push({area:'', obj:'', kr:'', done:'', target:''});
    save(); renderOkr();
  };

  function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- charts ----------
  function renderChart(svgId, inputsId, data, color, key) {
    const svg = document.getElementById(svgId);
    const inputs = document.getElementById(inputsId);
    const dim = data.length;
    const W = 600, H = 160, pad = 20;
    const nums = data.map(v => v === '' || v == null ? null : +v);
    const valid = nums.filter(v => v != null && !isNaN(v));
    const min = valid.length ? Math.min(...valid) : 0;
    const max = valid.length ? Math.max(...valid) : 1;
    const range = max - min || 1;

    let path = '';
    let dots = '';
    nums.forEach((v, i) => {
      if (v == null || isNaN(v)) return;
      const x = pad + (W - pad*2) * i / (dim - 1);
      const y = H - pad - (v - min) / range * (H - pad*2);
      path += (path ? ' L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1);
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${color}"/>`;
    });

    // axis
    let grid = '';
    for (let i = 1; i <= dim; i++) {
      const x = pad + (W - pad*2) * (i-1) / (dim - 1);
      if (i % 5 === 0 || i === 1 || i === dim) {
        grid += `<text x="${x.toFixed(1)}" y="${H-4}" font-size="9" fill="#9ca3af" text-anchor="middle">${i}</text>`;
      }
    }
    svg.innerHTML = `
      <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#e5e7eb" stroke-width="1"/>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      ${grid}
    `;

    // inputs
    inputs.innerHTML = '';
    for (let i = 0; i < dim; i++) {
      const wrap = document.createElement('label');
      wrap.innerHTML = `<input type="number" inputmode="decimal" value="${data[i] === '' ? '' : data[i]}" />${i+1}`;
      const inp = wrap.querySelector('input');
      inp.addEventListener('input', () => {
        state[key][i] = inp.value;
        save();
      });
      inp.addEventListener('blur', () => renderChart(svgId, inputsId, state[key], color, key));
      inputs.appendChild(wrap);
    }
  }
  // ---------- frequency chart + rings ----------
  function getDailyCounts() {
    const dim = daysInMonth(currentYm);
    const counts = Array(dim).fill(0);
    SECTIONS.forEach(s => {
      (state.habits[s]||[]).forEach(h => {
        h.days.forEach((v,i) => { if (v) counts[i]++; });
      });
    });
    return counts;
  }
  function totalHabits() {
    return SECTIONS.reduce((acc, s) => acc + (state.habits[s]||[]).length, 0);
  }
  function renderFreqChart() {
    const svg = document.getElementById('freqChart');
    const data = getDailyCounts();
    const dim = data.length;
    const W = 700, H = 220, padL = 30, padR = 20, padT = 20, padB = 30;
    const maxV = Math.max(1, totalHabits(), ...data);
    const today = new Date();
    const isCurMonth = ymKey(today) === currentYm;
    const todayD = isCurMonth ? today.getDate() : -1;

    // y grid lines
    let grid = '';
    const steps = 4;
    for (let i = 0; i <= steps; i++) {
      const y = padT + (H - padT - padB) * i / steps;
      const val = Math.round(maxV * (1 - i/steps));
      grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>`;
      grid += `<text x="${padL-6}" y="${y+3}" font-size="9" fill="#9ca3af" text-anchor="end">${val}</text>`;
    }

    // highlight band: today or current week
    let band = '';
    if (todayD > 0) {
      const wd = today.getDay();
      const monOffset = (wd === 0 ? 6 : wd - 1);
      const weekStart = Math.max(1, todayD - monOffset);
      const weekEnd = Math.min(dim, weekStart + 6);
      const x1 = padL + (W-padL-padR) * (weekStart-1)/(dim-1);
      const x2 = padL + (W-padL-padR) * (weekEnd-1)/(dim-1);
      band = `<rect x="${x1}" y="${padT}" width="${x2-x1}" height="${H-padT-padB}" fill="#e5e7eb" opacity="0.5"/>`;
    }

    // path
    let path = '', dots = '', xLabels = '';
    data.forEach((v, i) => {
      const x = padL + (W-padL-padR) * i / (dim-1);
      const y = padT + (H-padT-padB) * (1 - v / maxV);
      path += (path ? ' L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1);
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#f59e0b"/>`;
      const w = dayOfWeek(currentYm, i+1);
      xLabels += `<text x="${x.toFixed(1)}" y="${H-padB+12}" font-size="9" fill="#9ca3af" text-anchor="middle">${i+1}</text>`;
      xLabels += `<text x="${x.toFixed(1)}" y="${H-padB+22}" font-size="8" fill="#d1d5db" text-anchor="middle">${WEEK_CN[w]}</text>`;
    });

    svg.innerHTML = `
      ${band}
      ${grid}
      <path d="${path}" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
      ${dots}
      ${xLabels}
    `;
  }

  function sectionRate(section) {
    const items = state.habits[section]||[];
    if (!items.length) return { rate: 0, done: 0, target: 0 };
    let done = 0, target = 0;
    items.forEach(h => {
      done += h.days.filter(Boolean).length;
      target += +h.target || h.days.length;
    });
    return { rate: target ? Math.round(done/target*100) : 0, done, target };
  }
  function renderRings() {
    // compare to previous month
    const prevYm = (() => {
      const [y,m] = currentYm.split('-').map(Number);
      const d = new Date(y, m-2, 1);
      return ymKey(d);
    })();
    let prevState = null;
    try {
      const raw = localStorage.getItem(PREFIX + prevYm);
      if (raw) prevState = JSON.parse(raw);
    } catch {}
    function prevRate(section) {
      if (!prevState || !prevState.habits) return null;
      const items = prevState.habits[section]||[];
      if (!items.length) return null;
      let done = 0, target = 0;
      items.forEach(h => {
        done += (h.days||[]).filter(Boolean).length;
        target += +h.target || (h.days||[]).length;
      });
      return target ? Math.round(done/target*100) : 0;
    }
    const meta = [
      { key:'habit', label:'虚拟打卡' },
      { key:'sport', label:'Ai打卡' },
      { key:'study', label:'客户记录' }
    ];
    const wrap = document.getElementById('rings');
    wrap.innerHTML = '';
    meta.forEach(m => {
      const { rate } = sectionRate(m.key);
      const pr = prevRate(m.key);
      let deltaHtml = '';
      if (pr != null && pr > 0) {
        const d = Math.round((rate - pr) / pr * 100);
        deltaHtml = `<span class="delta ${d>=0?'up':'down'}">${d>=0?'▲':'▼'} ${d}%</span>`;
      } else if (pr == null && rate > 0) {
        deltaHtml = `<span class="delta up">▲ NEW</span>`;
      }
      const C = 2 * Math.PI * 50;
      const off = C * (1 - rate/100);
      wrap.insertAdjacentHTML('beforeend', `
        <div class="ring-card">
          <div class="ring-head"><strong>${m.label}</strong> ${deltaHtml}</div>
          <svg class="ring-svg" viewBox="0 0 130 130">
            <circle class="bg" cx="65" cy="65" r="50"/>
            <circle class="fg" cx="65" cy="65" r="50"
              stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"
              transform="rotate(-90 65 65)"/>
            <text class="pct" x="65" y="72" text-anchor="middle">${rate}%</text>
          </svg>
        </div>
      `);
    });
  }
  function renderCharts() {
    renderFreqChart();
    renderRings();
  }

  // ---------- habit tables ----------
  function renderHabit(section) {
    const dim = daysInMonth(currentYm);
    const tb = document.getElementById('habitTable_' + section);
    const items = state.habits[section] || [];

    let head = '<thead><tr><th>项目</th>';
    for (let d = 1; d <= dim; d++) {
      const w = dayOfWeek(currentYm, d);
      head += `<th class="day">${d}<br/><span style="font-weight:400;font-size:10px">${WEEK_CN[w]}</span></th>`;
    }
    head += '<th>达成</th><th>目标</th><th>完成率</th><th></th></tr></thead>';

    let body = '<tbody>';
    items.forEach((h, idx) => {
      const done = h.days.filter(Boolean).length;
      const target = +h.target || dim;
      const rate = target ? Math.round(done/target*100) + '%' : '';
      body += `<tr><td class="name" contenteditable data-edit="name" data-idx="${idx}">${esc(h.name)}</td>`;
      for (let d = 0; d < dim; d++) {
        const w = dayOfWeek(currentYm, d+1);
        const wkend = (w === 0 || w === 6) ? ' weekend' : '';
        body += `<td class="habit-cell${wkend}${h.days[d]?' checked':''}" data-idx="${idx}" data-d="${d}">${h.days[d]?'✓':''}</td>`;
      }
      body += `<td class="achieved">${done}</td>`;
      body += `<td class="target" contenteditable data-edit="target" data-idx="${idx}">${target}</td>`;
      body += `<td class="rate">${rate}</td>`;
      body += `<td><button class="row-del" data-del="${idx}">×</button></td>`;
      body += '</tr>';
    });
    body += '</tbody>';
    tb.innerHTML = head + body;

    tb.querySelectorAll('.habit-cell').forEach(c => {
      c.addEventListener('click', () => {
        const idx = +c.dataset.idx, d = +c.dataset.d;
        items[idx].days[d] = !items[idx].days[d];
        save(); renderHabit(section); renderCharts();
      });
    });
    tb.querySelectorAll('[contenteditable]').forEach(td => {
      td.addEventListener('blur', () => {
        const idx = +td.dataset.idx;
        const f = td.dataset.edit;
        items[idx][f] = f === 'target' ? td.textContent.trim() : td.textContent.trim();
        save(); renderHabit(section);
      });
    });
    tb.querySelectorAll('[data-del]').forEach(b => {
      b.onclick = () => {
        items.splice(+b.dataset.del, 1);
        save(); renderHabit(section);
      };
    });
  }
  function renderHabits() { SECTIONS.forEach(renderHabit); }

  document.querySelectorAll('[data-add-btn]').forEach(btn => {
    btn.onclick = () => {
      const sec = btn.dataset.addBtn;
      const inp = document.querySelector(`input[data-add="${sec}"]`);
      const name = inp.value.trim();
      if (!name) return;
      const dim = daysInMonth(currentYm);
      state.habits[sec].push({ name, target: dim, days: Array(dim).fill(false) });
      inp.value = '';
      save(); renderHabit(sec);
      toast('已添加 ✓');
    };
  });
  document.querySelectorAll('input[data-add]').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        document.querySelector(`[data-add-btn="${inp.dataset.add}"]`).click();
      }
    });
  });

  // ---------- editable text blocks ----------
  function renderTexts() {
    document.querySelectorAll('[data-key]').forEach(el => {
      el.textContent = state.texts[el.dataset.key] || '';
    });
  }
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('blur', () => {
      state.texts[el.dataset.key] = el.textContent;
      save();
    });
  });

  // ---------- export / import / reset ----------
  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify({ ym: currentYm, data: state }, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `monthly-review-${currentYm}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('已导出 ✓');
  };
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const obj = JSON.parse(r.result);
        if (obj.ym && obj.data) {
          localStorage.setItem(PREFIX + obj.ym, JSON.stringify(obj.data));
          currentYm = obj.ym;
          state = load(currentYm);
          buildMonthPicker();
          renderAll();
          toast('导入成功 ✓');
        } else { toast('文件格式错误'); }
      } catch { toast('解析失败'); }
    };
    r.readAsText(f);
    e.target.value = '';
  });
  document.getElementById('resetBtn').onclick = () => {
    if (!confirm(`确定清空 ${currentYm} 的全部数据？`)) return;
    localStorage.removeItem(PREFIX + currentYm);
    state = load(currentYm);
    renderAll();
    toast('已清空');
  };

  function renderAll() {
    renderTitle();
    renderOkr();
    renderHabits();
    renderCharts();
    renderTexts();
  }

  // ---------- alarm ----------
  const ALARM_KEY = 'monthly_review_alarms';
  let alarmState = loadAlarms();
  function loadAlarms() {
    try {
      const raw = localStorage.getItem(ALARM_KEY);
      if (!raw) return { enabled: true, items: [] };
      return Object.assign({ enabled: true, items: [] }, JSON.parse(raw));
    } catch { return { enabled: true, items: [] }; }
  }
  function saveAlarms() { localStorage.setItem(ALARM_KEY, JSON.stringify(alarmState)); }

  function renderAlarms() {
    const list = document.getElementById('alarmList');
    list.innerHTML = '';
    if (!alarmState.items.length) {
      list.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:20px;font-size:13px">暂无提醒，点击下方“添加提醒”</div>';
    } else {
      alarmState.items.forEach((a, i) => {
        const row = document.createElement('div');
        row.className = 'alarm-row' + (a.on ? ' on' : '');
        row.innerHTML = `
          <input type="time" value="${a.time}" data-i="${i}" data-f="time"/>
          <input type="text" value="${esc(a.label||'')}" placeholder="备注" data-i="${i}" data-f="label"/>
          <div class="switch" data-i="${i}" data-f="toggle"></div>
          <button class="row-del" data-i="${i}" data-f="del" title="删除">×</button>
        `;
        list.appendChild(row);
      });
    }
    // global switch
    document.getElementById('globalSwitch').classList.toggle('on', alarmState.enabled);
  }

  document.getElementById('alarmBtn').onclick = () => {
    document.getElementById('alarmModal').classList.add('show');
    renderAlarms();
  };
  document.getElementById('closeAlarmBtn').onclick = () => {
    document.getElementById('alarmModal').classList.remove('show');
  };
  document.getElementById('alarmModal').addEventListener('click', e => {
    if (e.target.id === 'alarmModal') e.currentTarget.classList.remove('show');
  });

  document.getElementById('globalSwitch').onclick = () => {
    alarmState.enabled = !alarmState.enabled;
    saveAlarms(); renderAlarms();
    if (alarmState.enabled) requestNotifPermission();
  };

  document.getElementById('addAlarmBtn').onclick = () => {
    if (alarmState.items.length >= 5) { toast('最多 5 个提醒'); return; }
    alarmState.items.push({ time: '22:00', label: '去打卡～', on: true });
    saveAlarms(); renderAlarms();
    requestNotifPermission();
  };

  document.getElementById('alarmList').addEventListener('input', e => {
    const i = +e.target.dataset.i; const f = e.target.dataset.f;
    if (!Number.isInteger(i)) return;
    if (f === 'time' || f === 'label') {
      alarmState.items[i][f] = e.target.value;
      saveAlarms();
    }
  });
  document.getElementById('alarmList').addEventListener('click', e => {
    const i = +e.target.dataset.i; const f = e.target.dataset.f;
    if (!Number.isInteger(i)) return;
    if (f === 'toggle') {
      alarmState.items[i].on = !alarmState.items[i].on;
      saveAlarms(); renderAlarms();
    } else if (f === 'del') {
      alarmState.items.splice(i, 1);
      saveAlarms(); renderAlarms();
    }
  });

  document.getElementById('testAlarmBtn').onclick = () => {
    ringBell();
    showNotif('⏰ 测试提醒', '这是一条测试通知');
  };

  function requestNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') Notification.requestPermission();
  }
  function showNotif(title, body) {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
      try { new Notification(title, { body, icon: '' }); } catch {}
    }
  }
  // beep via Web Audio
  let audioCtx = null;
  function ringBell() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      [0, 0.25, 0.5].forEach(delay => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = 880;
        g.gain.setValueAtTime(0, ctx.currentTime + delay);
        g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.18);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + delay);
        o.stop(ctx.currentTime + delay + 0.2);
      });
    } catch {}
  }

  // tick every 20s, fire once per minute per alarm
  let lastFiredKey = '';
  function tickAlarm() {
    if (!alarmState.enabled) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const cur = hh + ':' + mm;
    const dayKey = now.toISOString().slice(0,10);
    alarmState.items.forEach((a, i) => {
      if (!a.on || a.time !== cur) return;
      const fireKey = dayKey + '#' + i + '#' + cur;
      if (lastFiredKey === fireKey) return;
      lastFiredKey = fireKey;
      ringBell();
      showNotif('⏰ 打卡提醒', a.label || '该打卡了');
    });
  }
  setInterval(tickAlarm, 20000);

  buildMonthPicker();
  renderAll();
})();
</script>
</body>
</html>
